<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="d-flex justify-content-center align-items-center vh-100">
      <div class="container-div m-5 w-50 bg-danger-subtle rounded-3 p-5">
        <form>
          <div class="mb-3">
            <label for="exampleInputName" class="form-label">Full Name :</label>
            <input type="text" class="form-control" id="exampleInputName" />
            <div id="Help" class="form-text">Please Fill The Name Filed.</div>
          </div>
          <div class="mb-3">
            <label for="exampleInputAge" class="form-label">Age :</label>
            <input type="number" class="form-control" id="exampleInputAge" />
            <div id="Help" class="form-text">Please Fill The Age Filed.</div>
          </div>
          <div class="mb-3">
            <label for="exampleInputJob" class="form-label">Job : </label>
            <input type="text" class="form-control" id="exampleInputJob" />
            <div id="emailHelp" class="form-text">
              Please Fill The Job Filed..
            </div>
          </div>
          <button type="submit" class="btn btn-primary">Submit</button>
        </form>
      </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
